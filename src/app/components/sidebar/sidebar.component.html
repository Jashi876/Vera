<aside class="sidebar" [class.open]="isOpen">
  <button class="sidebar-close" (click)="toggleSidebar()">
    <i class="fas fa-times"></i>
  </button>
  <div class="sidebar-header">
    <a routerLink="/" class="logo">
      <div class="logo-icon">
        <i class="fas fa-clock"></i>
      </div>
      <span class="logo-text">VERA</span>
    </a>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section">
      <span class="nav-section-label">Main</span>
      <a routerLink="/dashboard" routerLinkActive="active" class="side-link">
        <i class="fas fa-th-large"></i>
        <span>Dashboard</span>
      </a>
      <a routerLink="/projects" routerLinkActive="active" class="side-link">
        <i class="fas fa-clapperboard"></i>
        <span>Projects</span>
      </a>
      <a routerLink="/call-sheets" routerLinkActive="active" class="side-link">
        <i class="fas fa-file-invoice"></i>
        <span>Call Sheets</span>
      </a>
    </div>

    <div class="nav-section">
      <span class="nav-section-label">Manage</span>
      <a routerLink="/team" routerLinkActive="active" class="side-link">
        <i class="fas fa-users"></i>
        <span>Team</span>
      </a>
      <a routerLink="/schedules" routerLinkActive="active" class="side-link">
        <i class="fas fa-calendar-alt"></i>
        <span>Schedules</span>
      </a>
    </div>

    <div class="nav-section">
      <span class="nav-section-label">Intelligence</span>
      <a (click)="toggleAiChat()" class="side-link ai-trigger" style="cursor: pointer;">
        <i class="fas fa-robot"></i>
        <span>Vera AI</span>
      </a>
      <a routerLink="/dashboard/script-analyzer" routerLinkActive="active" class="side-link">
        <i class="fas fa-file-signature"></i>
        <span>Script Analyzer</span>
      </a>
    </div>

    <div class="nav-section">
      <span class="nav-section-label">System</span>
      <a routerLink="/settings" routerLinkActive="active" class="side-link">
        <i class="fas fa-cog"></i>
        <span>Settings</span>
      </a>
      <a (click)="logout()" class="side-link logout" style="cursor: pointer;">
        <i class="fas fa-sign-out-alt"></i>
        <span>Sign Out</span>
      </a>
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="user-pill glass-card">
      <div class="user-avatar">{{ userInitials }}</div>
      <div class="user-info">
        <span class="user-name">{{ userName }}</span>
        <span class="user-role">Pro Account</span>
      </div>
      <i class="fas fa-chevron-right user-chevron"></i>
    </div>
  </div>
</aside>
