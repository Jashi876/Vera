<div class="glass-card pre-viz-card animate-fade-up">
  <div class="card-header-flex">
    <h3 class="card-title"><i class="fas fa-magic text-purple"></i> Instant AI Storyboarding</h3>
    <button class="btn btn-primary btn-sm" (click)="generateBoards()" [disabled]="isGenerating">
      <i class="fas fa-wand-sparkles" [class.fa-spin]="isGenerating"></i>
      {{ isGenerating ? 'Imagining...' : 'Generate Boards' }}
    </button>
  </div>

  <div class="input-group" style="margin-top: 20px;">
    <label>Visual Description from Script</label>
    <textarea class="input" rows="3" [(ngModel)]="sceneDescription" name="sceneDescription"></textarea>
  </div>

  <div class="storyboard-grid" style="margin-top: 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
    <div class="board-item glass-card" *ngFor="let board of storyboards" style="padding: 10px; border-color: var(--glass-border);">
      <div class="board-image" style="width: 100%; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; background: #000;">
        <img [src]="board.imageUrl" [alt]="board.description" style="width: 100%; height: 100%; object-fit: cover;">
      </div>
      <div class="board-meta" style="margin-top: 12px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <span class="badge badge-purple">Shot #{{ board.shotNumber }}</span>
          <span class="text-secondary" style="font-size: 11px;">{{ board.angle }}</span>
        </div>
        <p style="font-size: 13px; margin: 8px 0 0 0; color: var(--text-secondary);">{{ board.description }}</p>
      </div>
    </div>
  </div>

  <div class="empty-state" *ngIf="storyboards.length === 0 && !isGenerating" style="padding: 40px; text-align: center; color: var(--text-muted);">
    <i class="fas fa-image" style="font-size: 48px; margin-bottom: 16px; opacity: 0.3;"></i>
    <p>Enter a scene description and click generate to visualize your shots.</p>
  </div>
</div>
