<div class="auth-page">
  <div class="hero-mesh"></div>
  
  <div class="auth-container animate-fade-up">
    <a routerLink="/" class="auth-logo">
      <div class="logo-icon">
        <i class="fas fa-clock"></i>
      </div>
      <span>VERA</span>
    </a>

    <div class="glass-card auth-card">
      <div class="auth-header">
        <h1>Welcome Back</h1>
        <p>Enter your credentials to access your dashboard.</p>
        <div class="alert alert-error" *ngIf="error">
          <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
      </div>

      <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="handleLogin()">
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" class="input" placeholder="name@production.com" formControlName="email">
          <div class="error-hint" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
            Please enter a valid email.
          </div>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" class="input" placeholder="Password" formControlName="password">
          <div class="error-hint" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
            Password is required (min 6 chars).
          </div>
        </div>
        
        <div class="auth-extra">
          <label class="checkbox-label">
            <input type="checkbox"> Remember me
          </label>
          <a routerLink="/forgot-password" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-full" [disabled]="loading || loginForm.invalid">
          <i class="fas fa-spinner fa-spin" *ngIf="loading"></i>
          {{ loading ? 'Signing in...' : 'Sign In' }}
        </button>

        <div class="divider"><span>OR</span></div>

        <button type="button" class="btn btn-ghost btn-full google-btn" (click)="signInWithGoogle()">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="18">
          Sign in with Google
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a routerLink="/signup">Sign Up</a>
      </div>
    </div>
  </div>
</div>
