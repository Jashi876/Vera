<div class="auth-page">
  <div class="hero-mesh"></div>
  
  <div class="auth-container animate-fade-up">
    <a routerLink="/" class="auth-logo">
      <div class="logo-icon">
        <i class="fas fa-clock"></i>
      </div>
      <span>VERA</span>
    </a>

    <div class="glass-card auth-card">
      <div class="auth-header">
        <h1>Welcome Back</h1>
        <p>Enter your credentials to access your dashboard.</p>
      </div>

      <form class="auth-form" (submit)="handleLogin($event)">
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" class="input" placeholder="name@production.com" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" class="input" placeholder="••••••••" required>
        </div>
        
        <div class="auth-extra">
          <label class="checkbox-label">
            <input type="checkbox"> Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a routerLink="/signup">Sign Up</a>
      </div>
    </div>
  </div>
</div>
