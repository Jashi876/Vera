<div class="auth-page">
  <div class="hero-mesh"></div>
  
  <div class="auth-container animate-fade-up">
    <a routerLink="/" class="auth-logo">
      <div class="logo-icon">
        <i class="fas fa-clock"></i>
      </div>
      <span>VERA</span>
    </a>

    <div class="glass-card auth-card">
      <div class="auth-header">
        <h1>Reset Password</h1>
        <p>Enter your email address and we'll send you a link to reset your password.</p>
        
        <div class="alert alert-success" *ngIf="message">
          <i class="fas fa-check-circle"></i> {{ message }}
        </div>
        <div class="alert alert-error" *ngIf="error">
          <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
      </div>

      <form class="auth-form" (submit)="handleReset($event)" *ngIf="!message">
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" class="input" placeholder="name@production.com" [(ngModel)]="email" name="email" required>
        </div>
        
        <button type="submit" class="btn btn-primary btn-full" [disabled]="loading">
          <i class="fas fa-spinner fa-spin" *ngIf="loading"></i>
          {{ loading ? 'Sending...' : 'Send Reset Link' }}
        </button>
      </form>

      <div class="auth-footer">
        Remember your password? <a routerLink="/login">Sign In</a>
      </div>
    </div>
  </div>
</div>
