<div class="projects-page animate-fade-up">
  <header class="page-header">
    <div>
      <h1 class="page-title">My Projects</h1>
      <p class="page-subtitle">Manage and optimize your film productions.</p>
    </div>
    <button class="btn btn-primary" (click)="openModal()">
      <i class="fas fa-plus"></i> Create New Project
    </button>
  </header>

  <div class="grid-3 projects-grid" *ngIf="projects.length > 0; else emptyProjects">
    <div class="project-card glass-card" *ngFor="let project of projects">
      <!-- ... existing card content ... -->
    </div>
  </div>

  <ng-template #emptyProjects>
    <div class="empty-state-container glass-card animate-fade-up">
      <div class="empty-icon"><i class="fas fa-clapperboard"></i></div>
      <h2>No projects yet</h2>
      <p>Start your first production by clicking the button below.</p>
      <button class="btn btn-primary" (click)="openModal()">
        <i class="fas fa-plus"></i> Create Your First Project
      </button>
    </div>
  </ng-template>

  <!-- Create Project Modal -->
  <div class="modal-overlay" [class.active]="modalOpen">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">{{ isEditMode ? 'Edit Project' : 'Create New Project' }}</h3>
        <button class="modal-close" (click)="closeModal()"><i class="fas fa-times"></i></button>
      </div>
      <form class="project-form" (submit)="handleSubmit($event)">
        <div class="input-group">
          <label>Project Title</label>
          <input type="text" class="input" placeholder="e.g. Midnight Horizon" [(ngModel)]="newProject.title" name="title" required>
        </div>
        <div class="input-group">
          <label>Production Type</label>
          <select class="input">
            <option>Feature Film</option>
            <option>Short Film</option>
            <option>Commercial</option>
            <option>Documentary</option>
          </select>
        </div>
        <div class="input-group">
          <label>Script Upload (PDF)</label>
          <div class="file-drop-zone">
            <i class="fas fa-file-upload"></i>
            <span>Drag & drop script or click to browse</span>
          </div>
        </div>
        <div class="modal-footer" style="margin-top: 24px; display: flex; gap: 12px; justify-content: flex-end;">
          <button type="button" class="btn btn-ghost" (click)="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" [disabled]="loading">
            {{ loading ? 'Saving...' : (isEditMode ? 'Save Changes' : 'AI Analyze & Create') }}
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast for Project Creation (Simulated) -->
  <div class="toast-container" *ngIf="showToast">
    <div class="toast success">
      <i class="fas fa-check-circle"></i>
      <span>Project created and script analysis started!</span>
    </div>
  </div>
</div>
